networks:
  kong-net:
    driver: bridge

x-kong-config:
  &kong-env
  KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
  KONG_PG_HOST: kong-database
  KONG_PG_USER: ${KONG_PG_USER:-kong}
  KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong}

x-konga-config:
  &konga-env
  NODE_ENV: ${KONGA_NODE_ENV:-production}
  TOKEN_SECRET: ${KONGA_TOKEN_SECRET:-your-secret-token-change-in-production}
  DB_ADAPTER: postgres
  DB_HOST: kong-database
  DB_PORT: 5432
  DB_USER: ${KONGA_DB_USER:-konga}
  DB_PASSWORD: ${KONGA_DB_PASSWORD:-konga}
  DB_DATABASE: ${KONGA_DB_DATABASE:-konga}
  KONGA_HOOK_TIMEOUT: 120000

volumes:
  kong_data: {}
  konga_data: {}
  kong_prefix_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
  kong_tmp_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (shared by Kong and Konga)
  # ---------------------------------------------------------------------------
  kong-database:
    container_name: kong-database
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    environment:
      POSTGRES_USER: ${KONG_PG_USER:-kong}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:-kong}
      # Multiple databases created via init script
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -d
        - ${KONG_PG_DATABASE:-kong}
        - -U
        - ${KONG_PG_USER:-kong}
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: on-failure:5
    networks:
      - kong-net
    volumes:
      - kong_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ---------------------------------------------------------------------------
  # Kong Migrations
  # ---------------------------------------------------------------------------
  kong-migrations:
    container_name: kong-migrations
    image: kong:${KONG_VERSION:-3.9}
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      <<: *kong-env
    networks:
      - kong-net
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Kong Gateway
  # ---------------------------------------------------------------------------
  kong:
    container_name: kong
    image: kong:${KONG_VERSION:-3.9}
    user: "${KONG_USER:-kong}"
    environment:
      <<: *kong-env
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: ${KONG_PROXY_LISTEN:-0.0.0.0:8000, 0.0.0.0:8443 ssl}
      KONG_ADMIN_LISTEN: ${KONG_ADMIN_LISTEN:-0.0.0.0:8001, 0.0.0.0:8444 ssl}
      KONG_ADMIN_GUI_LISTEN: ${KONG_ADMIN_GUI_LISTEN:-0.0.0.0:8002}
      KONG_ADMIN_GUI_URL: ${KONG_ADMIN_GUI_URL:-http://localhost:8002}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PREFIX: ${KONG_PREFIX:-/var/run/kong}
    networks:
      - kong-net
    ports:
      - "${KONG_PROXY_HTTP_PORT:-8000}:8000"
      - "${KONG_PROXY_HTTPS_PORT:-8443}:8443"
      - "${KONG_ADMIN_HTTP_PORT:-8001}:8001"
      - "${KONG_ADMIN_HTTPS_PORT:-8444}:8444"
      - "${KONG_MANAGER_PORT:-8002}:8002"
    healthcheck:
      test:
        - CMD
        - kong
        - health
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: on-failure:5
    read_only: true
    depends_on:
      kong-database:
        condition: service_healthy
    volumes:
      - kong_prefix_vol:${KONG_PREFIX:-/var/run/kong}
      - kong_tmp_vol:/tmp
      - ./config:/opt/kong:ro
    security_opt:
      - no-new-privileges

  # ---------------------------------------------------------------------------
  # Konga - Kong Admin GUI
  # Note: Using built-in SQLite for local development
  # ---------------------------------------------------------------------------
  konga:
    container_name: konga
    image: pantsel/konga:latest
    platform: linux/amd64  # Required for Apple Silicon (uses Rosetta)
    environment:
      NODE_ENV: development
      TOKEN_SECRET: ${KONGA_TOKEN_SECRET:-your-secret-token-change-in-production}
      noDBAdapter: "true"
      KONGA_HOOK_TIMEOUT: 120000
    networks:
      - kong-net
    ports:
      - "${KONGA_PORT:-1337}:1337"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:1337', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: on-failure:5
    depends_on:
      kong:
        condition: service_healthy
    volumes:
      - konga_data:/app/kongadata
